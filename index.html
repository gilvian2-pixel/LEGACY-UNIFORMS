<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LEGACY Uniforms</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f4;color:#111;}
input,select,textarea{font-family:inherit;font-size:13px;padding:6px 9px;border:0.5px solid #d1d5db;border-radius:6px;outline:none;background:#fff;color:#111;width:100%;}
input:focus,select:focus,textarea:focus{border-color:#6b7280;box-shadow:0 0 0 2px rgba(107,114,128,.12);}
input[type=checkbox]{width:auto;margin-right:5px;accent-color:#2563eb;}
button{font-family:inherit;cursor:pointer;}
@media print{.no-print{display:none!important;}body{background:#fff;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

const SIZES=['XS','S','M','L','XL','XXL'];
const CATALOG=['Polo','T-Shirt / Camisa','Gorra','Jersey Femenino','Jersey Masculino','Hoodie','Pantalón Reversible','Falda','Leggings','Lycra','Medias','Sleeves','Otro'];
const DEF={'Polo':20,'T-Shirt / Camisa':14,'Gorra':15,'Jersey Femenino':14,'Jersey Masculino':14,'Hoodie':18,'Pantalón Reversible':27,'Falda':15,'Leggings':18,'Lycra':15,'Medias':8,'Sleeves':6,'Otro':0};
const FABRICS=['Dri-Fit','Sublimación','Algodón','Poliéster','Spandex','Mesh/Malla','French Terry','Lycra','Nylon','Otro'];
const SPORTS=['Basketball','Fútbol','Volleyball','Baseball','Softball','Tenis','Track & Field','Natación','Ciclismo','Otro'];
const COLLARS=['— No aplica —','Redondo','Cuello V','Polo/Botones','Cuello alto','Otro'];
const AUDIENCES=['Hombre','Mujer','Niños'];
const STATUSES=[
  {key:'enviada',  label:'Enviada a cliente', color:'#2563eb',bg:'#eff6ff'},
  {key:'aceptada', label:'Aceptada',           color:'#7c3aed',bg:'#f5f3ff'},
  {key:'deposito', label:'Depósito cobrado',   color:'#d97706',bg:'#fffbeb'},
  {key:'entregado',label:'Entregado',           color:'#059669',bg:'#ecfdf5'},
  {key:'saldo',    label:'Saldo cobrado',       color:'#111',   bg:'#f3f4f6'},
];
const statusInfo=k=>STATUSES.find(s=>s.key===k)||STATUSES[0];

// ── Google Sheets ──────────────────────────────────────────────────────────
const SHEET_URL='https://script.google.com/macros/s/AKfycbz22_e2sPkrNYgAfVaAyXVp_--V5ihSUq7-0YLpHGnEnJwkcR6Or1lDV75HJSD52qSvKg/exec';
const sendToSheet=async(entry)=>{
  try{
    // strip images (too large for sheets)
    const slim={...entry,items:entry.items.map(i=>({...i,images:[]}))};
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(slim)});
  }catch(e){console.error('Sheet:',e);}
};

// ── Local storage (GitHub Pages friendly) ─────────────────────────────────
const LS_KEY='legacy_pipeline_v2';
const lsLoad=()=>{try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):[];}catch{return[];}};
const lsSave=(d)=>{try{localStorage.setItem(LS_KEY,JSON.stringify(d));}catch(e){console.error(e);}};

// ── Helpers ────────────────────────────────────────────────────────────────
let _n=0; const uid=()=>++_n;
const today=()=>new Date().toISOString().split('T')[0];
const fmt=n=>'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const rf=(file,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);};
const qtyOf=i=>SIZES.reduce((s,sz)=>s+(Number(i[sz.toLowerCase()])||0),0);

const newQI=()=>({
  id:uid(),name:'Polo',price:20,
  xs:0,s:0,m:0,l:0,xl:0,xxl:0,
  fabric:'Dri-Fit',material:'',
  audience:'Hombre',collar:'',
  reversible:false,isSport:false,sport:'Basketball',
  images:[]   // [{id,src,label}]
});
const newOI=()=>({
  id:uid(),garment:'Polo',color:'',fabric:'Dri-Fit',material:'',
  xs:0,s:0,m:0,l:0,xl:0,xxl:0,
  productImg:null,logo:null,
  placement:'Frente pecho izquierdo',placementSize:'5 cm',notes:''
});
const newOrd=()=>{const n=uid();return{
  id:n,orderNum:`ORD-${new Date().getFullYear()}-${String(n).padStart(3,'0')}`,
  client:'',date:today(),deliveryDate:'',items:[newOI()],notes:''
};};

// ── UI primitives ──────────────────────────────────────────────────────────
const Card=({children,style={}})=><div style={{background:'#fff',borderRadius:10,border:'0.5px solid #e5e7eb',padding:'14px 16px',...style}}>{children}</div>;
const Lbl=({c})=><div style={{fontSize:11,fontWeight:500,color:'#6b7280',marginBottom:4,letterSpacing:'.03em'}}>{c}</div>;
const Btn=({onClick,children,style={},disabled=false})=><button onClick={onClick} disabled={disabled} style={{padding:'7px 14px',borderRadius:7,border:'0.5px solid #d1d5db',background:'#fff',fontSize:13,...style}}>{children}</button>;
const Field=({label,children})=><div><Lbl c={label}/>{children}</div>;

function ImgUp({value,onChange,label}){
  const ref=useRef();
  return <div>
    <Lbl c={label}/>
    {value
      ?<div style={{position:'relative'}}>
          <img src={value} alt={label} style={{width:'100%',height:100,objectFit:'contain',borderRadius:7,border:'0.5px solid #e5e7eb',background:'#f9fafb',display:'block'}}/>
          <button onClick={()=>onChange(null)} style={{position:'absolute',top:4,right:4,background:'#fff',border:'0.5px solid #d1d5db',borderRadius:5,padding:'1px 7px',fontSize:11,cursor:'pointer',color:'#6b7280',lineHeight:'18px'}}>×</button>
        </div>
      :<div onClick={()=>ref.current?.click()} style={{height:100,border:'0.5px dashed #d1d5db',borderRadius:7,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',cursor:'pointer',gap:5,background:'#f9fafb'}}>
          <div style={{width:28,height:28,border:'0.5px solid #d1d5db',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'#9ca3af'}}>+</div>
          <div style={{fontSize:12,color:'#9ca3af'}}>Subir imagen</div>
        </div>}
    <input ref={ref} type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files?.[0];if(f)rf(f,onChange);}}/>
  </div>;
}

// Multi-image upload strip
function MultiImgUp({images=[],onChange}){
  const ref=useRef();
  const add=()=>ref.current?.click();
  const remove=id=>onChange(images.filter(i=>i.id!==id));
  const relabel=(id,label)=>onChange(images.map(i=>i.id===id?{...i,label}:i));
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
      <Lbl c={`Imágenes de referencia${images.length?` (${images.length})`:''}`}/>
      <button onClick={add} style={{fontSize:12,padding:'3px 10px',borderRadius:6,border:'0.5px dashed #2563eb',background:'#eff6ff',color:'#2563eb',cursor:'pointer'}}>+ Agregar imagen</button>
    </div>
    <input ref={ref} type="file" accept="image/*" multiple style={{display:'none'}}
      onChange={e=>{
        Array.from(e.target.files).forEach(f=>rf(f,src=>onChange([...images,{id:uid(),src,label:''}])));
        e.target.value='';
      }}/>
    {images.length===0
      ?<div onClick={add} style={{padding:'14px',border:'0.5px dashed #e5e7eb',borderRadius:8,textAlign:'center',fontSize:12,color:'#9ca3af',background:'#f9fafb',cursor:'pointer'}}>
          Haz clic o usa el botón para subir diseños, logos o referencias
        </div>
      :<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:8}}>
          {images.map((img,ii)=><div key={img.id}>
            <div style={{position:'relative'}}>
              <img src={img.src} alt={`img-${ii}`} style={{width:'100%',height:85,objectFit:'contain',border:'0.5px solid #e5e7eb',borderRadius:7,background:'#f9fafb',display:'block'}}/>
              <button onClick={()=>remove(img.id)} style={{position:'absolute',top:3,right:3,background:'#fff',border:'0.5px solid #d1d5db',borderRadius:4,padding:'0 5px',fontSize:11,cursor:'pointer',color:'#6b7280',lineHeight:'18px'}}>×</button>
            </div>
            <input value={img.label} onChange={e=>relabel(img.id,e.target.value)} placeholder="Ej: logo frente" style={{marginTop:4,fontSize:11,padding:'3px 6px'}}/>
          </div>)}
        </div>}
  </div>;
}

// ── Word exports ───────────────────────────────────────────────────────────
function exportQuoteToWord({qC,qN,qD,qDD,items}){
  const dStr=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-PR',{year:'numeric',month:'long',day:'numeric'}):'—';
  const total=i=>qtyOf(i)*(Number(i.price)||0);
  const grand=items.reduce((s,i)=>s+total(i),0);
  const rows=items.map((item,idx)=>`
    <tr style="background:${idx%2?'#f9fafb':'#fff'}">
      <td style="padding:7px 10px;border:1px solid #e5e7eb;font-weight:500">${item.name}</td>
      <td style="padding:7px 6px;border:1px solid #e5e7eb;text-align:center">${item.fabric||'—'}</td>
      <td style="padding:7px 6px;border:1px solid #e5e7eb;text-align:center">${item.audience||'—'}</td>
      <td style="padding:7px 6px;border:1px solid #e5e7eb;text-align:center">${item.collar||'—'}</td>
      ${SIZES.map(s=>`<td style="padding:7px 5px;border:1px solid #e5e7eb;text-align:center">${Number(item[s.toLowerCase()])||'—'}</td>`).join('')}
      <td style="padding:7px 8px;border:1px solid #e5e7eb;text-align:center;font-weight:600">${qtyOf(item)}</td>
      <td style="padding:7px 8px;border:1px solid #e5e7eb;text-align:center">${fmt(item.price)}</td>
      <td style="padding:7px 10px;border:1px solid #e5e7eb;text-align:right;font-weight:600;color:#2563eb">${fmt(total(item))}</td>
    </tr>`).join('');
  const imgsHtml=items.flatMap(i=>(i.images||[]).map(img=>`
    <div style="display:inline-block;margin:4px;text-align:center;vertical-align:top">
      <img src="${img.src}" style="height:90px;width:auto;border:1px solid #e5e7eb;border-radius:6px;display:block"/>
      <div style="font-size:9pt;color:#6b7280;margin-top:3px">${img.label||i.name}</div>
    </div>`)).join('');
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"/><title>Cotización ${qN}</title>
<style>body{font-family:Arial,sans-serif;font-size:12pt;color:#111;}table{border-collapse:collapse;width:100%;}th{background:#1e3a5f;color:#fff;padding:7px 8px;}</style></head>
<body>
<table style="margin-bottom:16px"><tr>
  <td><img src="logo.png" style="height:50px" onerror="this.style.display='none'"/><br/><span style="font-size:9pt;color:#6b7280">787-249-0678 · santiago.emmanuel08@gmail.com</span></td>
  <td style="text-align:right;vertical-align:top"><div style="font-size:16pt;font-weight:bold;color:#2563eb">${qN}</div><div style="font-size:10pt;color:#6b7280">${dStr(qD)}</div></td>
</tr></table>
<table style="margin-bottom:14px;width:auto">
  <tr><td style="font-size:9pt;color:#6b7280;padding-right:20px">Preparado para:</td><td style="font-size:13pt;font-weight:bold">${qC||'—'}</td></tr>
  <tr><td style="font-size:9pt;color:#6b7280">Fecha de entrega:</td><td style="font-size:11pt;font-weight:500">${dStr(qDD)}</td></tr>
</table>
<table style="margin-bottom:14px">
  <thead><tr>
    <th style="text-align:left;padding:7px 10px">Artículo</th>
    <th>Tela</th><th>Audiencia</th><th>Cuello</th>
    ${SIZES.map(s=>`<th>${s}</th>`).join('')}
    <th>Cant.</th><th>P.U.</th><th style="text-align:right;padding-right:10px">Total</th>
  </tr></thead>
  <tbody>${rows}</tbody>
</table>
<table style="width:250px;margin-left:auto;margin-bottom:18px">
  <tr><td style="padding:5px 10px;color:#6b7280;font-size:10pt">Total piezas</td><td style="text-align:right;font-weight:600">${items.reduce((s,i)=>s+qtyOf(i),0)}</td></tr>
  <tr style="border-top:1px solid #e5e7eb"><td style="padding:8px 10px;font-size:13pt;font-weight:bold">Total general</td><td style="text-align:right;font-size:14pt;font-weight:bold;color:#2563eb">${fmt(grand)}</td></tr>
</table>
${imgsHtml?`<div style="margin-bottom:14px"><div style="font-size:9pt;font-weight:bold;color:#6b7280;margin-bottom:6px">IMÁGENES DE REFERENCIA</div>${imgsHtml}</div>`:''}
<div style="background:#f9fafb;padding:9px 12px;border-radius:6px;font-size:9pt;color:#6b7280"><b>Condiciones:</b> Precios por unidad · Cotización válida 30 días · No incluye IVU</div>
</body></html>`;
  dl(html,`Cotizacion_${qN}.doc`);
}

function exportOrderToWord(order){
  const dStr=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-PR',{year:'numeric',month:'long',day:'numeric'}):'—';
  const pcs=order.items.reduce((s,i)=>s+qtyOf(i),0);
  const itemsHtml=order.items.map((item,idx)=>`
    <div style="margin-bottom:20px;padding-bottom:20px;${idx<order.items.length-1?'border-bottom:1px solid #e5e7eb':''}">
      <table style="width:100%;margin-bottom:8px"><tr>
        <td style="font-size:14pt;font-weight:bold">${item.garment}${item.color?` — ${item.color}`:''}</td>
        <td style="text-align:right;font-size:10pt;color:#6b7280">Tela: ${item.fabric||'—'}</td>
      </tr></table>
      <table style="border-collapse:collapse;width:100%;margin-bottom:8px">
        <thead><tr>${SIZES.map(s=>`<th style="background:#1e3a5f;color:#fff;padding:6px 8px">${s}</th>`).join('')}<th style="background:#1e3a5f;color:#fff;padding:6px 8px">Total</th></tr></thead>
        <tbody><tr style="text-align:center">${SIZES.map(s=>`<td style="padding:6px 8px;border:1px solid #e5e7eb">${Number(item[s.toLowerCase()])||'—'}</td>`).join('')}<td style="padding:6px 8px;border:1px solid #e5e7eb;font-weight:bold;color:#2563eb">${qtyOf(item)}</td></tr></tbody>
      </table>
      ${item.notes?`<div style="padding:8px;background:#f9fafb;border-radius:5px;font-size:10pt">${item.notes}</div>`:''}
    </div>`).join('');
  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"/><title>Ficha ${order.orderNum}</title><style>body{font-family:Arial,sans-serif;font-size:12pt;color:#111;}</style></head>
<body>
<table style="width:100%;margin-bottom:16px"><tr>
  <td><span style="font-size:18pt;font-weight:bold">LEGACY UNIFORMS</span></td>
  <td style="text-align:right"><div style="font-size:15pt;font-weight:bold">${order.orderNum}</div><div>${order.client||'—'}</div><div style="font-size:9pt;color:#6b7280">${dStr(order.date)}</div></td>
</tr></table>
<hr style="border:0;border-top:1px solid #e5e7eb;margin-bottom:16px"/>
${itemsHtml}
<div style="margin-top:16px;padding-top:10px;border-top:1px solid #e5e7eb;font-size:9pt;color:#9ca3af">LEGACY Uniforms · 787-249-0678 · Total piezas: <b>${pcs}</b></div>
</body></html>`;
  dl(html,`Orden_${order.orderNum}.doc`);
}

function dl(html,name){
  const blob=new Blob([html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url);
}

// ── Quote Form ─────────────────────────────────────────────────────────────
function QuoteView({qC,setQC,qN,setQN,qD,setQD,qDD,setQDD,items,setItem,addItem,delItem,onPreview,onExport}){
  const total=i=>qtyOf(i)*(Number(i.price)||0);
  const grand=items.reduce((s,i)=>s+total(i),0);
  const pcs=items.reduce((s,i)=>s+qtyOf(i),0);
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div><div style={{fontSize:17,fontWeight:500}}>Nueva Cotización</div><div style={{fontSize:12,color:'#6b7280',marginTop:2}}>Artículos, tallas y especificaciones</div></div>
      <div style={{display:'flex',gap:8}}>
        <Btn onClick={onExport} style={{background:'#f0fdf4',color:'#16a34a',fontWeight:500,border:'none'}}>⬇ Exportar Word</Btn>
        <Btn onClick={onPreview} style={{background:'#eff6ff',color:'#2563eb',fontWeight:500,border:'none'}}>Ver cotización →</Btn>
      </div>
    </div>

    {/* Header */}
    <Card style={{marginBottom:12}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 160px 150px 160px',gap:10}}>
        <Field label="Cliente"><input value={qC} onChange={e=>setQC(e.target.value)} placeholder="Nombre del cliente"/></Field>
        <Field label="No. cotización"><input value={qN} onChange={e=>setQN(e.target.value)}/></Field>
        <Field label="Fecha"><input type="date" value={qD} onChange={e=>setQD(e.target.value)}/></Field>
        <Field label="Fecha de entrega"><input type="date" value={qDD} onChange={e=>setQDD(e.target.value)}/></Field>
      </div>
    </Card>

    {/* Items */}
    {items.map((item,idx)=>{
      const si=(id,f,v)=>setItem(id,f,v);
      return <Card key={item.id} style={{marginBottom:10}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontWeight:500,fontSize:13,color:'#374151'}}>Artículo {idx+1}</div>
          {items.length>1&&<button onClick={()=>delItem(item.id)} style={{fontSize:11,background:'none',border:'none',cursor:'pointer',color:'#9ca3af'}}>Eliminar</button>}
        </div>

        {/* Row 1: Artículo, precio, tela, material */}
        <div style={{display:'grid',gridTemplateColumns:'180px 90px 1fr 1fr',gap:10,marginBottom:10}}>
          <Field label="Artículo">
            <select value={item.name} onChange={e=>{si(item.id,'name',e.target.value);setItem(item.id,'price',DEF[e.target.value]??0);}}>
              {CATALOG.map(c=><option key={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Precio u.">
            <input type="number" value={item.price} onChange={e=>si(item.id,'price',e.target.value)} style={{textAlign:'center'}}/>
          </Field>
          <Field label="Tipo de tela">
            <select value={item.fabric} onChange={e=>si(item.id,'fabric',e.target.value)}>
              {FABRICS.map(f=><option key={f}>{f}</option>)}
            </select>
          </Field>
          <Field label="Material / detalle">
            <input value={item.material} onChange={e=>si(item.id,'material',e.target.value)} placeholder="Ej: 100% poliéster reciclado..."/>
          </Field>
        </div>

        {/* Row 2: Audiencia, cuello, opciones */}
        <div style={{display:'grid',gridTemplateColumns:'140px 160px 1fr',gap:10,marginBottom:10}}>
          <Field label="Audiencia">
            <select value={item.audience} onChange={e=>si(item.id,'audience',e.target.value)}>
              {AUDIENCES.map(a=><option key={a}>{a}</option>)}
            </select>
          </Field>
          <Field label="Tipo de cuello">
            <select value={item.collar||''} onChange={e=>si(item.id,'collar',e.target.value)}>
              {COLLARS.map(c=><option key={c} value={c==='— No aplica —'?'':c}>{c}</option>)}
            </select>
          </Field>
          <div>
            <Lbl c="Opciones de prenda"/>
            <div style={{display:'flex',gap:20,marginTop:6,flexWrap:'wrap'}}>
              <label style={{display:'flex',alignItems:'center',gap:5,fontSize:13,cursor:'pointer'}}>
                <input type="checkbox" checked={item.reversible} onChange={e=>si(item.id,'reversible',e.target.checked)} style={{width:'auto'}}/> Reversible
              </label>
              <label style={{display:'flex',alignItems:'center',gap:5,fontSize:13,cursor:'pointer'}}>
                <input type="checkbox" checked={item.isSport} onChange={e=>si(item.id,'isSport',e.target.checked)} style={{width:'auto'}}/> Uniforme deportivo
              </label>
              {item.isSport&&<select value={item.sport} onChange={e=>si(item.id,'sport',e.target.value)} style={{width:'auto',fontSize:13}}>
                {SPORTS.map(s=><option key={s}>{s}</option>)}
              </select>}
            </div>
          </div>
        </div>

        {/* Tallas */}
        <div style={{marginBottom:14}}>
          <Lbl c="Cantidades por talla"/>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
            {SIZES.map(s=><div key={s} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
              <div style={{fontSize:11,fontWeight:500,color:'#6b7280'}}>{s}</div>
              <input type="number" min={0} value={item[s.toLowerCase()]} onChange={e=>si(item.id,s.toLowerCase(),e.target.value)} style={{width:52,textAlign:'center'}}/>
            </div>)}
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,marginLeft:4}}>
              <div style={{fontSize:11,fontWeight:500,color:'#6b7280'}}>Total</div>
              <div style={{width:52,height:34,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:600,fontSize:15,color:'#2563eb'}}>{qtyOf(item)}</div>
            </div>
            <div style={{marginLeft:6,fontSize:14,fontWeight:500,color:'#2563eb',paddingBottom:4}}>{fmt(total(item))}</div>
          </div>
        </div>

        {/* Multi-image upload */}
        <div style={{borderTop:'0.5px solid #f0f0f0',paddingTop:12}}>
          <MultiImgUp

// ── Pipeline ───────────────────────────────────────────────────────────────
function Pipeline({pipeline,setPipeline}){
  const dStr=d=>d?new Date(d+'T12:00:00').toLocaleDateString('es-PR',{month:'short',day:'numeric',year:'numeric'}):'—';
  const grand=items=>items.reduce((s,i)=>s+qtyOf(i)*(Number(i.price)||0),0);
  const updateStatus=(id,status)=>{const u=pipeline.map(q=>q.id===id?{...q,status}:q);setPipeline(u);lsSave(u);};
  const del=(id)=>{const u=pipeline.filter(q=>q.id!==id);setPipeline(u);lsSave(u);};
  const totals=STATUSES.reduce((acc,s)=>{acc[s.key]=pipeline.filter(q=>q.status===s.key).reduce((sum,q)=>sum+grand(q.items),0);return acc;},{});

  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div>
        <div style={{fontSize:17,fontWeight:500}}>Cotizaciones sometidas</div>
        <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>{pipeline.length} cotización{pipeline.length!==1?'es':''}</div>
      </div>
    </div>

    {/* Status summary */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:16}}>
      {STATUSES.map(s=>{const count=pipeline.filter(q=>q.status===s.key).length;return(
        <div key={s.key} style={{background:s.bg,border:`0.5px solid ${s.color}33`,borderRadius:10,padding:'10px 12px'}}>
          <div style={{fontSize:10,fontWeight:600,color:s.color,marginBottom:4,letterSpacing:'.03em'}}>{s.label.toUpperCase()}</div>
          <div style={{fontSize:18,fontWeight:700,color:s.color}}>{count}</div>
          <div style={{fontSize:11,color:s.color,opacity:.8,marginTop:2}}>{fmt(totals[s.key])}</div>
        </div>);})}
    </div>

    {pipeline.length===0
      ?<Card style={{textAlign:'center',padding:'2.5rem'}}>
          <div style={{fontSize:14,color:'#6b7280',marginBottom:6}}>No hay cotizaciones sometidas aún</div>
          <div style={{fontSize:12,color:'#9ca3af'}}>Crea una cotización y presiona "Someter cotización"</div>
        </Card>
      :<div style={{display:'flex',flexDirection:'column',gap:8}}>
          {pipeline.map(q=>{
            const si=statusInfo(q.status);
            const pcs=q.items.reduce((s,i)=>s+qtyOf(i),0);
            return <Card key={q.id} style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
              <div style={{minWidth:140}}>
                <div style={{fontSize:10,color:'#6b7280',marginBottom:4}}>Estado</div>
                <select value={q.status} onChange={e=>updateStatus(q.id,e.target.value)}
                  style={{fontSize:11,fontWeight:600,color:si.color,background:si.bg,border:`0.5px solid ${si.color}55`,borderRadius:6,padding:'4px 8px',width:'auto',cursor:'pointer'}}>
                  {STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
                </select>
              </div>
              <div style={{flex:1,minWidth:140}}>
                <div style={{fontWeight:600,fontSize:14}}>{q.client||'Sin cliente'}</div>
                <div style={{fontSize:11,color:'#6b7280',marginTop:2}}>{q.quoteNum} · {dStr(q.date)}</div>
              </div>
              {q.deliveryDate&&<div style={{minWidth:100}}>
                <div style={{fontSize:10,color:'#6b7280',marginBottom:2}}>Entrega</div>
                <div style={{fontSize:12,fontWeight:500,color:'#2563eb'}}>{dStr(q.deliveryDate)}</div>
              </div>}
              <div style={{minWidth:60,textAlign:'right'}}>
                <div style={{fontSize:10,color:'#6b7280',marginBottom:2}}>Piezas</div>
                <div style={{fontSize:13,fontWeight:600}}>{pcs}</div>
              </div>
              <div style={{minWidth:90,textAlign:'right'}}>
                <div style={{fontSize:10,color:'#6b7280',marginBottom:2}}>Total</div>
                <div style={{fontSize:14,fontWeight:700,color:'#2563eb'}}>{fmt(grand(q.items))}</div>
              </div>
              <button onClick={()=>del(q.id)} style={{background:'none',border:'none',fontSize:18,color:'#d1d5db',cursor:'pointer',padding:'4px 6px'}} title="Eliminar">×</button>
            </Card>;
          })}
        </div>}

    {/* Revenue summary */}
    {pipeline.length>0&&<div style={{marginTop:14,display:'flex',justifyContent:'flex-end'}}>
      <Card style={{padding:'12px 18px',minWidth:220}}>
        <div style={{fontSize:11,color:'#6b7280',marginBottom:8,fontWeight:600,letterSpacing:'.03em'}}>RESUMEN GENERAL</div>
        {[
          ['Total cotizado',   pipeline.reduce((s,q)=>s+grand(q.items),0),'#6b7280'],
          ['Total aceptado',   ['aceptada','deposito','entregado','saldo'].reduce((s,k)=>s+totals[k],0),'#7c3aed'],
          ['Total cobrado',    ['deposito','saldo'].reduce((s,k)=>s+totals[k],0),'#059669'],
        ].map(([l,v,c])=><div key={l} style={{display:'flex',justifyContent:'space-between',gap:30,fontSize:12,marginBottom:6}}>
          <span style={{color:'#6b7280'}}>{l}</span><span style={{fontWeight:600,color:c}}>{fmt(v)}</span>
        </div>)}
      </Card>
    </div>}
  </div>;
}

          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:15,fontWeight:600,marginBottom:8}}>{item.garment}{item.color?` — ${item.color}`:''} <span style={{fontSize:11,background:'#f3f4f6',color:'#374141',padding:'2px 7px',borderRadius:4}}>{item.fabric}</span></div>
            <div style={{border:'0.5px solid #e5e7eb',borderRadius:7,overflow:'hidden',marginBottom:8}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead><tr style={{background:'#f9fafb'}}>{SIZES.map(s=><th key={s} style={{padding:'5px 7px',textAlign:'center',fontWeight:500,fontSize:11,color:'#6b7280'}}>{s}</th>)}<th style={{padding:'5px 7px',textAlign:'center',fontWeight:500,fontSize:11,color:'#6b7280'}}>Total</th></tr></thead>
                <tbody><tr>{SIZES.map(s=><td key={s} style={{padding:'5px 7px',textAlign:'center',fontWeight:Number(item[s.toLowerCase()])>0?600:400,color:Number(item[s.toLowerCase()])>0?'#111':'#d1d5db'}}>{Number(item[s.toLowerCase()])||'—'}</td>)}<td style={{padding:'5px 7px',textAlign:'center',fontWeight:600,color:'#2563eb'}}>{qtyOf(item)}</td></tr></tbody>
              </table>
            </div>
            <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
              <div><div style={{fontSize:11,color:'#6b7280',marginBottom:2}}>Ubicación</div><div style={{fontSize:12}}>{item.placement||'—'}</div></div>
              {item.placementSize&&<div><div style={{fontSize:11,color:'#6b7280',marginBottom:2}}>Tamaño</div><div style={{fontSize:12}}>{item.placementSize}</div></div>}
            </div>
            {item.notes&&<div style={{padding:'6px 10px',background:'#f9fafb',borderRadius:7,fontSize:12,marginTop:8}}>{item.notes}</div>}
          </div>
        </div>
      </div>)}
      <div style={{marginTop:16,paddingTop:12,borderTop:'0.5px solid #e5e7eb',display:'flex',justifyContent:'space-between',fontSize:11,color:'#9ca3af'}}>
        <span>LEGACY Uniforms · 787-249-0678</span>
        <span>Total piezas: <strong style={{color:'#111'}}>{pcs}</strong></span>
      </div>
    </Card>
  </div>;
}

// ── App Root ───────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('quote');
  const [qC,setQC]=useState('');
  const [qN,setQN]=useState('COT-2026-001');
  const [qD,setQD]=useState(today());
  const [qDD,setQDD]=useState('');
  const [qItems,setQItems]=useState([newQI()]);
  const [submitted,setSubmitted]=useState(false);
  const [pipeline,setPipeline]=useState(()=>lsLoad());
  const [orders,setOrders]=useState([]);
  const [curOrd,setCurOrd]=useState(null);

  const setQItem=(id,f,v)=>setQItems(p=>p.map(i=>i.id===id?{...i,[f]:v}:i));
  const addItem=()=>{setQItems(p=>[...p,newQI()]);setSubmitted(false);};
  const delItem=(id)=>{setQItems(p=>p.filter(i=>i.id!==id));setSubmitted(false);};
  const saveOrd=()=>{
    if(!curOrd)return;
    setOrders(p=>{const idx=p.findIndex(o=>o.id===curOrd.id);if(idx>=0){const n=[...p];n[idx]=curOrd;return n;}return[...p,curOrd];});
    setView('logistics');setCurOrd(null);
  };
  const submitToPipeline=async()=>{
    const entry={id:uid(),quoteNum:qN,client:qC,date:qD,deliveryDate:qDD,items:qItems,status:'enviada',submittedAt:new Date().toISOString()};
    const updated=[...pipeline,entry];
    setPipeline(updated);lsSave(updated);
    await sendToSheet(entry);
    setSubmitted(true);
  };

  const activeTab=view==='quote-prev'?'quote':['order-form','order-prev'].includes(view)?'logistics':view;
  const tabs=[['quote','Nueva Cotización'],['pipeline','Cotizaciones'],['logistics','Logística']];

  return <div style={{fontFamily:'system-ui,-apple-system,sans-serif',color:'#111',minHeight:600,background:'#f5f5f4'}}>
    {/* Navbar */}
    <div className="no-print" style={{background:'#fff',borderBottom:'0.5px solid #e5e7eb',padding:'0 16px',display:'flex',alignItems:'center',justifyContent:'space-between',height:50,position:'sticky',top:0,zIndex:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <img src="logo.png" alt="Legacy" onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex';}} style={{height:34,width:'auto',objectFit:'contain'}}/>
        <div style={{width:30,height:30,background:'#1e3a5f',borderRadius:7,display:'none',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:'#fff'}}>L</div>
        <div>
          <div style={{fontWeight:700,fontSize:13,letterSpacing:'.07em'}}>LEGACY UNIFORMS</div>
          <div style={{fontSize:9,color:'#9ca3af',letterSpacing:'.05em'}}>SISTEMA DE GESTIÓN</div>
        </div>
      </div>
      <nav style={{display:'flex',gap:4}}>
        {tabs.map(([v,label])=>{const active=activeTab===v;return(
          <button key={v} onClick={()=>setView(v)} style={{padding:'5px 13px',borderRadius:7,border:'0.5px solid',borderColor:active?'#9ca3af':'#e5e7eb',background:active?'#f3f4f6':'transparent',fontSize:12,fontWeight:active?500:400,cursor:'pointer',color:active?'#111':'#6b7280',position:'relative'}}>
            {label}
            {v==='pipeline'&&pipeline.length>0&&<span style={{position:'absolute',top:-4,right:-4,background:'#2563eb',color:'#fff',fontSize:9,fontWeight:700,borderRadius:10,padding:'1px 5px',minWidth:14,textAlign:'center'}}>{pipeline.length}</span>}
          </button>);})}
      </nav>
    </div>

    {/* Content */}
    <div style={{maxWidth:960,margin:'0 auto',padding:14}}>
      {view==='quote'&&
        <QuoteView qC={qC} setQC={setQC} qN={qN} setQN={setQN} qD={qD} setQD={setQD} qDD={qDD} setQDD={setQDD}
          items={qItems} setItem={setQItem} addItem={addItem} delItem={delItem}
          onPreview={()=>setView('quote-prev')} onExport={()=>exportQuoteToWord({qC,qN,qD,qDD,items:qItems})}/>}
      {view==='quote-prev'&&
        <QuotePreview qC={qC} qN={qN} qD={qD} qDD={qDD} items={qItems}
          onBack={()=>setView('quote')} onExport={()=>exportQuoteToWord({qC,qN,qD,qDD,items:qItems})}
          onSubmit={submitToPipeline} submitted={submitted}/>}
      {view==='pipeline'&&
        <Pipeline pipeline={pipeline} setPipeline={setPipeline}/>}
      {view==='logistics'&&
        <LogList orders={orders} onNew={()=>{setCurOrd(newOrd());setView('order-form');}} onEdit={o=>{setCurOrd(JSON.parse(JSON.stringify(o)));setView('order-form');}} onDel={id=>setOrders(p=>p.filter(o=>o.id!==id))} onView={o=>{setCurOrd(o);setView('order-prev');}}/>}
      {view==='order-form'&&curOrd&&
        <OrderForm order={curOrd} setCO={setCurOrd} onSave={saveOrd} onCancel={()=>{setView('logistics');setCurOrd(null);}}/>}
      {view==='order-prev'&&curOrd&&
        <OrderPreview order={curOrd} onBack={()=>setView('logistics')} onExport={()=>exportOrderToWord(curOrd)}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
